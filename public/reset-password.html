<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nueva contraseña – BizPonzor</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 0 auto; padding: 48px 20px; background: #0a0a0b; color: #e5e5e5; }
    h1 { font-size: 1.25rem; margin-bottom: 8px; }
    p { color: #a1a1aa; font-size: 0.9rem; margin-bottom: 20px; }
    label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: #a1a1aa; margin-bottom: 8px; }
    input { width: 100%; box-sizing: border-box; padding: 12px 14px; border-radius: 10px; border: 1px solid #333; background: #18181b; color: #fff; margin-bottom: 16px; }
    button { width: 100%; padding: 12px; border: none; border-radius: 10px; background: linear-gradient(135deg, #7c3aed, #8b5cf6); color: #fff; font-weight: 700; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #msg { margin-top: 14px; font-size: 0.88rem; }
    a { color: #a78bfa; }
  </style>
</head>
<body>
  <h1>Nueva contraseña</h1>
  <p id="hint">Elige una contraseña segura (mínimo 8 caracteres).</p>
  <form id="f">
    <label for="pw">Nueva contraseña</label>
    <input type="password" id="pw" required minlength="8" autocomplete="new-password" />
    <label for="pw2">Confirmar contraseña</label>
    <input type="password" id="pw2" required minlength="8" autocomplete="new-password" />
    <button type="submit" id="btn">Guardar</button>
  </form>
  <div id="msg"></div>
  <p style="margin-top:24px"><a href="/">← Volver al inicio</a></p>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    if (!token) {
      document.getElementById('hint').textContent = 'Falta el token en la URL. Usa el enlace completo que enviamos.';
      document.getElementById('f').style.display = 'none';
    }
    document.getElementById('f').addEventListener('submit', async function (e) {
      e.preventDefault();
      const pw = document.getElementById('pw').value;
      const pw2 = document.getElementById('pw2').value;
      const msg = document.getElementById('msg');
      const btn = document.getElementById('btn');
      if (pw !== pw2) {
        msg.style.color = '#fca5a5';
        msg.textContent = 'Las contraseñas no coinciden.';
        return;
      }
      btn.disabled = true;
      msg.textContent = '';
      try {
        const r = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: pw, passwordConfirm: pw2 })
        });
        const data = await r.json();
        if (data.error) {
          msg.style.color = '#fca5a5';
          msg.textContent = data.error;
        } else {
          msg.style.color = '#86efac';
          msg.textContent = data.message || 'Contraseña actualizada.';
          document.getElementById('f').style.display = 'none';
        }
      } catch (err) {
        msg.style.color = '#fca5a5';
        msg.textContent = 'Error de red.';
      }
      btn.disabled = false;
    });
  </script>
</body>
</html>
