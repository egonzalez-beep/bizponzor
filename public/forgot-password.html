<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recuperar contraseña – BizPonzor</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 0 auto; padding: 48px 20px; background: #0a0a0b; color: #e5e5e5; }
    h1 { font-size: 1.25rem; margin-bottom: 8px; }
    p { color: #a1a1aa; font-size: 0.9rem; margin-bottom: 20px; }
    label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: #a1a1aa; margin-bottom: 8px; }
    input { width: 100%; box-sizing: border-box; padding: 12px 14px; border-radius: 10px; border: 1px solid #333; background: #18181b; color: #fff; margin-bottom: 16px; }
    button { width: 100%; padding: 12px; border: none; border-radius: 10px; background: linear-gradient(135deg, #7c3aed, #8b5cf6); color: #fff; font-weight: 700; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #msg { margin-top: 14px; font-size: 0.88rem; }
    a { color: #a78bfa; }
  </style>
</head>
<body>
  <h1>Recuperar contraseña</h1>
  <p>Introduce el correo de tu cuenta. Si existe, podrás restablecer tu contraseña con el enlace (en desarrollo, revisa la consola del servidor si aplica).</p>
  <form id="f">
    <label for="email">Correo electrónico</label>
    <input type="email" id="email" required autocomplete="email" />
    <button type="submit" id="btn">Enviar solicitud</button>
  </form>
  <div id="msg"></div>
  <p style="margin-top:24px"><a href="/">← Volver al inicio</a></p>
  <script>
    document.getElementById('f').addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const msg = document.getElementById('msg');
      const email = document.getElementById('email').value.trim();
      btn.disabled = true;
      msg.textContent = '';
      try {
        const r = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await r.json();
        msg.style.color = '#86efac';
        msg.textContent = data.message || (data.error ? 'Error: ' + data.error : 'Listo.');
      } catch (err) {
        msg.style.color = '#fca5a5';
        msg.textContent = 'Error de red. Intenta de nuevo.';
      }
      btn.disabled = false;
    });
  </script>
</body>
</html>
